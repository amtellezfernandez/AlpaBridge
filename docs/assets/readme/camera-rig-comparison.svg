<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" font-family="-apple-system, Segoe UI, Helvetica Neue, Arial, sans-serif">
  <defs>
    <marker id="rigarrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f766e"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="430" fill="white"/>

  <!-- Panel A: typical multi-camera rig -->
  <text x="220" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">A typical AV camera rig</text>
  <text x="220" y="48" text-anchor="middle" font-size="10.5" fill="#64748b">e.g. Waymo's Perception-dataset camera schema</text>

  <!-- car body -->
  <rect x="170" y="90" width="100" height="210" rx="22" fill="#e5e7eb" stroke="#334155" stroke-width="1.5"/>

  <!-- 8 camera positions, numbered -->
  <!-- 1 FRONT -->
  <circle cx="220" cy="98" r="6" fill="#0f766e"/>
  <text x="220" y="80" text-anchor="middle" font-size="10" fill="#0f766e" font-weight="700">1</text>
  <!-- 2 FRONT_LEFT -->
  <circle cx="182" cy="108" r="6" fill="#0f766e"/>
  <text x="160" y="105" text-anchor="middle" font-size="10" fill="#0f766e" font-weight="700">2</text>
  <!-- 3 FRONT_RIGHT -->
  <circle cx="258" cy="108" r="6" fill="#0f766e"/>
  <text x="280" y="105" text-anchor="middle" font-size="10" fill="#0f766e" font-weight="700">3</text>
  <!-- 4 SIDE_LEFT -->
  <circle cx="172" cy="195" r="6" fill="#0f766e"/>
  <text x="150" y="199" text-anchor="middle" font-size="10" fill="#0f766e" font-weight="700">4</text>
  <!-- 5 SIDE_RIGHT -->
  <circle cx="268" cy="195" r="6" fill="#0f766e"/>
  <text x="290" y="199" text-anchor="middle" font-size="10" fill="#0f766e" font-weight="700">5</text>
  <!-- 6 REAR_LEFT -->
  <circle cx="182" cy="282" r="6" fill="#0f766e"/>
  <text x="160" y="298" text-anchor="middle" font-size="10" fill="#0f766e" font-weight="700">6</text>
  <!-- 7 REAR -->
  <circle cx="220" cy="292" r="6" fill="#0f766e"/>
  <text x="220" y="312" text-anchor="middle" font-size="10" fill="#0f766e" font-weight="700">7</text>
  <!-- 8 REAR_RIGHT -->
  <circle cx="258" cy="282" r="6" fill="#0f766e"/>
  <text x="280" y="298" text-anchor="middle" font-size="10" fill="#0f766e" font-weight="700">8</text>

  <!-- legend -->
  <text x="60" y="340" font-size="9.5" fill="#334155">1 FRONT&#160;&#160;&#160;&#160;2 FRONT_LEFT&#160;&#160;&#160;&#160;3 FRONT_RIGHT&#160;&#160;&#160;&#160;4 SIDE_LEFT</text>
  <text x="60" y="356" font-size="9.5" fill="#334155">5 SIDE_RIGHT&#160;&#160;&#160;&#160;6 REAR_LEFT&#160;&#160;&#160;&#160;7 REAR&#160;&#160;&#160;&#160;8 REAR_RIGHT</text>
  <text x="60" y="378" font-size="9" fill="#94a3b8">Source: waymo_open_dataset/dataset.proto CameraName enum. Not every vehicle</text>
  <text x="60" y="391" font-size="9" fill="#94a3b8">necessarily populates all eight; this illustrates the schema's positions.</text>

  <!-- divider -->
  <line x1="450" y1="20" x2="450" y2="410" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Panel B: this AlpaSim setup -->
  <text x="670" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">This AlpaSim setup, right now</text>
  <text x="670" y="48" text-anchor="middle" font-size="10.5" fill="#64748b">every retained rollout on this machine</text>

  <rect x="620" y="90" width="100" height="210" rx="22" fill="#e5e7eb" stroke="#334155" stroke-width="1.5"/>

  <!-- wide FOV cone -->
  <path d="M 670 98 L 590 20 A 130 130 0 0 1 750 20 Z" fill="#0f766e" opacity="0.12"/>
  <line x1="670" y1="98" x2="590" y2="20" stroke="#0f766e" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="670" y1="98" x2="750" y2="20" stroke="#0f766e" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="670" cy="98" r="7" fill="#0f766e"/>

  <text x="670" y="345" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">camera_front_wide_120fov</text>
  <text x="670" y="362" text-anchor="middle" font-size="9.5" fill="#64748b">one camera, 120&#176; wide field of view, front-facing only</text>
  <text x="670" y="382" text-anchor="middle" font-size="9" fill="#94a3b8">Defined by the local ego-hood rig assets</text>
  <text x="670" y="395" text-anchor="middle" font-size="9" fill="#94a3b8">(hyperion_8 / hyperion_8_1) &#8212; an AlpaSim asset, not adapter code.</text>
</svg>
